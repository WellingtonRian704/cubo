<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cubo 3x3x3 Explodido</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            background: #1a1a1a; perspective: 1200px;
            overflow: hidden; touch-action: none;
            user-select: none;
        }

        .cubo-mestre {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(20deg);
            width: 0; height: 0;
        }

        .cubinho {
            position: absolute;
            width: 50px; height: 50px;
            transform-style: preserve-3d;
            top: -25px; left: -25px; 
        }

        .face {
            position: absolute;
            width: 50px; height: 50px;
            background: #ffffff;
            /* Arestas cinza claro */
            border: 1px solid #d1d1d1; 
            box-sizing: border-box;
            /* Suave sombra interna para dar volume às faces brancas */
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        .frente  { transform: translateZ(25px); }
        .atras   { transform: rotateY(180deg) translateZ(25px); }
        .direita { transform: rotateY(90deg) translateZ(25px); }
        .esquerda{ transform: rotateY(-90deg) translateZ(25px); }
        .topo    { transform: rotateX(90deg) translateZ(25px); }
        .baixo   { transform: rotateX(-90deg) translateZ(25px); }
    </style>
</head>
<body>

    <div class="cubo-mestre" id="cubo-mestre"></div>

    <script>
        const container = document.getElementById('cubo-mestre');
        const facesNomes = ['frente', 'atras', 'direita', 'esquerda', 'topo', 'baixo'];

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const cubinho = document.createElement('div');
                    cubinho.className = 'cubinho';
                    
                    // Aumentado para 65 para afastar bem os cubinhos
                    const gap = 65; 
                    const posX = x * gap; 
                    const posY = y * gap;
                    const posZ = z * gap;

                    cubinho.style.transform = `translate3d(${posX}px, ${posY}px, ${posZ}px)`;

                    facesNomes.forEach(nome => {
                        const face = document.createElement('div');
                        face.className = `face ${nome}`;
                        cubinho.appendChild(face);
                    });

                    container.appendChild(cubinho);
                }
            }
        }

        // Lógica de Giro
        let rotX = -20; let rotY = 20;
        let isDragging = false;
        let lastX, lastY;

        window.onmousedown = (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            rotY += deltaX * 0.5;
            rotX -= deltaY * 0.5;
            container.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            lastX = e.clientX;
            lastY = e.clientY;
        };

        window.onmouseup = () => isDragging = false;
    </script>
</body>
</html>
